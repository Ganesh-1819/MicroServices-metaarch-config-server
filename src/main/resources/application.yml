server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config

eureka:
  client:
    service-url:
      EUREKA_SERVER_URL:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
